name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build
        run: |
          npm ci
          npm run build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            if [ ! -d /var/www/notepackz-editor ]; then
              git clone https://github.com/Zulqurnain/notepackz-editor.git /var/www/notepackz-editor
            fi
            cd /var/www/notepackz-editor
            git pull origin main
            npm ci --omit=dev
            npm run build
            cp -r .next/static .next/standalone/.next/static
            cp -r public .next/standalone/public
            pm2 describe notepackz-editor > /dev/null 2>&1 \
              && pm2 restart notepackz-editor \
              || pm2 start ecosystem.config.js
            pm2 save
