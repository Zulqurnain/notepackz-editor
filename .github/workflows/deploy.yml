name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & Build
        run: |
          npm ci
          npm run build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'ENDSSH'
          set -e
          if [ ! -d /var/www/notepackz-editor ]; then
            git clone https://github.com/Zulqurnain/notepackz-editor.git /var/www/notepackz-editor
          fi
          cd /var/www/notepackz-editor
          git pull origin main
          npm ci --omit=dev
          npm run build
          cp -r .next/static .next/standalone/.next/static
          cp -r public .next/standalone/public
          if pm2 describe notepackz-editor > /dev/null 2>&1; then
            pm2 restart notepackz-editor
          else
            pm2 start ecosystem.config.js
          fi
          pm2 save
          ENDSSH
